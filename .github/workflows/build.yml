name: Build PetroSoft

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            python-arch: x64
          - os: windows-latest
            platform: win
            python-arch: x64
          - os: ubuntu-latest
            platform: linux
            python-arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: ${{ matrix.python-arch }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Python dependencies
        run: |
          pip install -r server/requirements.txt
          pip install pyinstaller

      - name: Build Python backend
        working-directory: server
        run: pyinstaller petrosoft_server.spec --clean

      - name: Verify backend build
        shell: bash
        run: |
          echo "=== Backend build output ==="
          ls -la server/dist/petrosoft-server/
          du -sh server/dist/petrosoft-server/

      - name: Install Node dependencies
        run: pnpm install

      - name: Build Electron app
        run: pnpm build:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PetroSoft-${{ matrix.platform }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
          retention-days: 30

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
          draft: true
